name: Quest APK

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: quest-client/Library
          key: quest-client-${{ runner.os }}-${{ hashFiles('quest-client/Packages/**', 'quest-client/ProjectSettings/**') }}
          restore-keys: quest-client-${{ runner.os }}-
      - name: Build Android APK with Unity
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: quest-client
          unityVersion: 6000.3.6f1
          targetPlatform: Android
          buildMethod: MaQuestLink.QuestClient.Editor.BuildQuestClient.Build
          allowDirtyBuild: true
      - name: Verify APK
        run: test -s quest-client/Builds/MaQuestLink.apk
      - uses: actions/upload-artifact@v4
        with:
          name: MaQuestLink-Quest-APK
          path: quest-client/Builds/MaQuestLink.apk
          if-no-files-found: error
