name: Feature request
description: Propose a focused enhancement
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem and audience
      description: Who is blocked and what are they trying to do?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility and alternatives
      description: Note Unity/OpenXR/Quest impact and alternatives considered.
